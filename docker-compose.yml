services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mdk/mailcleaner:2.0
    container_name: mailcleaner-api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PW: password
      REQUEST_QUEUE: mailcleaner:requests
      WORKER_ENABLED: "true"
    ports:
      - "8000:8000"
    networks:
      - server-net
    restart: unless-stopped

networks:
  server-net:
    external: true
